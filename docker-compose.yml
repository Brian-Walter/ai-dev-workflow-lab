services:
  api:
    build: .
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --app-dir src
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - sqlite_data:/data
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite:////data/app.db
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"

volumes:
  sqlite_data:
