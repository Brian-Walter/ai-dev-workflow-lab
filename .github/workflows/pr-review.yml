name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  automated-review:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run lint
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m ruff check . > lint-report.txt 2>&1
          status=$?
          {
            echo "status=$status"
            echo "summary<<EOF"
            if [ "$status" -eq 0 ]; then
              echo "Ruff passed."
            else
              echo "Ruff found issues."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          python -m pytest -q > test-report.txt 2>&1
          status=$?
          {
            echo "status=$status"
            echo "summary<<EOF"
            if [ "$status" -eq 0 ]; then
              tail -n 1 test-report.txt
            else
              echo "Tests failed."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Detect common issues
        id: common
        continue-on-error: true
        shell: bash
        run: |
          set +e
          issues=0
          : > common-issues-report.md

          echo "## Common Issues" >> common-issues-report.md
          echo "" >> common-issues-report.md

          if git ls-files | grep -Eq '(^|/)app\.db$|\.pyc$|__pycache__|\.venv/|\.pytest_cache/|\.ruff_cache/'; then
            echo "- Generated/runtime artifacts appear to be tracked." >> common-issues-report.md
            issues=$((issues + 1))
          fi

          if grep -RIn --exclude=pr-review.yml --exclude-dir=.git --exclude-dir=.venv --exclude-dir=.pytest_cache --exclude-dir=.ruff_cache -E 'TODO|FIXME|XXX' src tests scripts README.md pyproject.toml .github 2>/dev/null; then
            echo "- TODO/FIXME markers were found. Confirm they are intentional." >> common-issues-report.md
            issues=$((issues + 1))
          fi

          if grep -RIn --exclude-dir=.git --exclude-dir=.venv --exclude-dir=.pytest_cache --exclude-dir=.ruff_cache -E 'print\(|breakpoint\(' src tests 2>/dev/null; then
            echo "- Debug statements were found in source or tests." >> common-issues-report.md
            issues=$((issues + 1))
          fi

          if [ ! -f Dockerfile ]; then
            echo "- Dockerfile is missing." >> common-issues-report.md
            issues=$((issues + 1))
          fi

          if [ ! -f docker-compose.yml ]; then
            echo "- docker-compose.yml is missing." >> common-issues-report.md
            issues=$((issues + 1))
          fi

          if [ "$issues" -eq 0 ]; then
            echo "- No common issues detected." >> common-issues-report.md
          fi

          {
            echo "issues=$issues"
            echo "summary<<EOF"
            cat common-issues-report.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          exit 0

      - name: Add automated PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- ai-dev-workflow-lab-pr-review -->";
            const lintStatus = Number("${{ steps.lint.outputs.status }}");
            const testStatus = Number("${{ steps.tests.outputs.status }}");
            const commonIssues = Number("${{ steps.common.outputs.issues }}");

            const lintReport = fs.readFileSync("lint-report.txt", "utf8").trim();
            const testReport = fs.readFileSync("test-report.txt", "utf8").trim();
            const commonReport = fs.readFileSync("common-issues-report.md", "utf8").trim();

            const statusText = (ok) => ok ? "PASS" : "FAIL";
            const body = `${marker}
            ## Automated Review

            | Check | Result |
            | --- | --- |
            | Lint | ${statusText(lintStatus === 0)} |
            | Tests | ${statusText(testStatus === 0)} |
            | Common issues | ${commonIssues === 0 ? "PASS" : "WARN"} |

            ${commonReport}

            <details>
            <summary>Lint output</summary>

            \`\`\`text
            ${lintReport || "No lint output."}
            \`\`\`
            </details>

            <details>
            <summary>Test output</summary>

            \`\`\`text
            ${testReport || "No test output."}
            \`\`\`
            </details>
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.data.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail on review problems
        if: steps.lint.outputs.status != '0' || steps.tests.outputs.status != '0' || steps.common.outputs.issues != '0'
        run: exit 1
